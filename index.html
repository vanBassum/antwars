<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Armymen RTS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: system-ui, sans-serif; }
    .resource-bar {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 16px; padding: 8px 14px;
      background: rgba(0, 0, 0, 0.55); border-radius: 8px;
      color: #fff; font-size: 16px; z-index: 1000; pointer-events: none;
      backdrop-filter: blur(6px);
    }
    .resource-item  { display: flex; align-items: center; gap: 6px; }
    .resource-icon  { font-size: 20px; }
    .resource-count { font-weight: 600; min-width: 30px; text-align: right; }
    .action-bar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; z-index: 1000;
    }
    .action-btn {
      width: 64px; height: 64px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      background: rgba(0, 0, 0, 0.55); border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px; color: #fff;
      font-size: 11px; cursor: pointer; backdrop-filter: blur(6px);
      transition: background 0.1s, border-color 0.1s;
    }
    .action-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.4);
    }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .action-btn .action-icon { font-size: 28px; line-height: 1; }
    .action-btn .action-cost { font-size: 11px; opacity: 0.85; }
    .context-menu {
      position: fixed; z-index: 1100;
      display: flex; flex-direction: column; gap: 4px;
      padding: 8px; min-width: 180px;
      background: rgba(0, 0, 0, 0.78); border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px; color: #fff;
      font-size: 13px; backdrop-filter: blur(6px);
    }
    .context-menu-title {
      font-size: 14px; font-weight: 600;
      padding: 2px 4px 4px;
    }
    .context-menu-state {
      font-size: 12px; opacity: 0.75; padding: 0 4px 4px;
    }
    .context-menu-progress {
      display: flex; align-items: center; gap: 8px;
      padding: 4px; font-size: 12px;
    }
    .context-menu-progress .progress-label {
      min-width: 60px; opacity: 0.75;
    }
    .context-menu-progress .progress-bar {
      flex: 1; height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px; overflow: hidden;
    }
    .context-menu-progress .progress-fill {
      height: 100%; background: #6a8e3a;
      transition: width 0.2s ease-out;
    }
    .context-menu-progress .progress-text {
      font-variant-numeric: tabular-nums;
      font-size: 11px; opacity: 0.85;
      min-width: 50px; text-align: right;
    }
    .context-menu-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; background: transparent;
      border: 1px solid transparent; border-radius: 4px;
      color: #fff; font-size: 13px; cursor: pointer; text-align: left;
    }
    .context-menu-btn:hover    { background: rgba(255, 255, 255, 0.12); }
    .context-menu-btn.selected {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.4);
    }
    .context-menu-btn .btn-icon  { font-size: 18px; }
    .context-menu-btn .btn-label { font-weight: 500; }
  </style>
<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <script type="module" src="game/main.js"></script>
</body>
</html>
